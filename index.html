                chatItem.rel = 'noopener noreferrer';
                chatItem.dataset.user = profile.id;

                const statusClass = profile.status === 'online' ? 'status-online' : 
                                   (profile.status === 'offline' ? 'status-offline' : 'status-away');

                chatItem.innerHTML = `
                    <div class="avatar-container">
                        <img src="${profile.avatar}" alt="${profile.name}" class="avatar" loading="lazy">
                        <span class="status-dot ${statusClass}"></span>
                        ${index < 3 ? '<span class="premium-badge">👑</span>' : ''}
                    </div>
                    <div class="chat-info">
                        <div class="chat-header">
                            <span class="chat-name">${profile.name} ${index < 2 ? '💎' : ''}</span>
                            <span class="chat-time">${randomTime}</span>
                        </div>
                        <div class="chat-preview">
                            <span class="preview-text">${randomPreview}</span>
                            ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : ''}
                        </div>
                    </div>
                `;

                inboxList.appendChild(chatItem);
            });
        }

        function populateOnlineUsers() {
            const onlineUsersDiv = document.getElementById('onlineUsers');
            onlineUsersDiv.innerHTML = '';

            ONLINE_USERS.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.className = 'online-user';
                userDiv.dataset.link = user.link;

                userDiv.innerHTML = `
                    <div class="online-avatar">
                        <img src="${user.avatar}" alt="${user.name}" loading="lazy">
                        <span class="status-dot status-online"></span>
                        <span class="premium-badge">${user.badge}</span>
                    </div>
                    <span class="online-name">${user.name}</span>
                `;

                userDiv.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.open(this.dataset.link, '_blank');
                });

                onlineUsersDiv.appendChild(userDiv);
            });
        }

        function setupFab() {
            const fab = document.getElementById('fabButton');
            fab.addEventListener('click', function() {
                window.open(FAB_LINK, '_blank');
            });
        }

        function setupActiveState() {
            const chatItems = document.querySelectorAll('.chat-item');
            chatItems.forEach(item => {
                item.addEventListener('click', function() {
                    chatItems.forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        function setupSearch() {
            const searchInput = document.querySelector('.search-input input');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    const searchTerm = e.target.value.toLowerCase();
                    const chatItems = document.querySelectorAll('.chat-item');
                    
                    chatItems.forEach(item => {
                        const name = item.querySelector('.chat-name').textContent.toLowerCase();
                        if (name.includes(searchTerm)) {
                            item.style.display = 'flex';
                        } else {
                            item.style.display = 'none';
                        }
                    });
                });
            }
        }

        function init() {
            populateInbox();
            populateOnlineUsers();
            setupFab();
            setupSearch();
            setTimeout(setupActiveState, 100);
            console.log('✨ Premium Messenger loaded with 20 Bangladeshi girls! ✨');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
